services:

  db:
    image: mysql:8.0
    container_name: cotisations_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: EspaceMembreDB
    volumes:
      - ./db/espacemembre.sql:/docker-entrypoint-initdb.d/espacemembre.sql
      - db_data:/var/lib/mysql
    networks:
      - cotisations_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build: ./php
    container_name: cotisations_php
    restart: always
    volumes:
      - ./app:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cotisations_network

  nginx:
    image: nginx:latest
    container_name: cotisations_nginx
    restart: always
    ports:
      - "8081:80" 
    volumes:
      - ./app:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - cotisations_network

networks:
  cotisations_network:
    driver: bridge

volumes:
  db_data:
